<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluento Kids – Lessons</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { fredoka:['"Fredoka One"','cursive'], nunito:['Nunito','sans-serif'] },
      colors: {
        green:  { DEFAULT:'#58CC02', dark:'#46A302', light:'#89E219' },
        blue:   { DEFAULT:'#1CB0F6', dark:'#0A8FCC' },
        yellow: { DEFAULT:'#FFC800', dark:'#E5A100' },
        red:    { DEFAULT:'#FF4B4B', dark:'#CC3B3B' },
        purple: '#CE82FF',
        orange: '#FF9600',
        sidebar:'#235390',
        'sidebar-dark':'#1A3D6B',
      },
      keyframes: {
        slideIn:   { from:{ opacity:'0', transform:'translateX(-32px)' }, to:{ opacity:'1', transform:'none' } },
        popIn:     { '0%':{ opacity:'0', transform:'scale(0.5)' }, '60%':{ transform:'scale(1.12)' }, '100%':{ opacity:'1', transform:'scale(1)' } },
        floatY:    { '0%,100%':{ transform:'translateY(0px)' }, '50%':{ transform:'translateY(-6px)' } },
        pageIn:    { from:{ opacity:'0', transform:'translateY(18px)' }, to:{ opacity:'1', transform:'none' } },
        grow:      { from:{ width:'0' }, to:{ width:'var(--tw-bar-w)' } },
        bounce2:   { '0%,100%':{ transform:'translateY(0)' }, '40%':{ transform:'translateY(-8px)' }, '60%':{ transform:'translateY(-4px)' } },
        confetti:  { '0%':{ transform:'translateY(0) rotate(0deg)', opacity:'1' }, '100%':{ transform:'translateY(130px) rotate(720deg)', opacity:'0' } },
        pulseGlow: { '0%,100%':{ boxShadow:'0 0 0 0 rgba(255,200,0,.4)' }, '50%':{ boxShadow:'0 0 0 14px rgba(255,200,0,0)' } },
        shimmer:   { '0%':{ backgroundPosition:'-200% 0' }, '100%':{ backgroundPosition:'200% 0' } },
        cardSlide: { from:{ opacity:'0', transform:'translateY(22px)' }, to:{ opacity:'1', transform:'none' } },
      },
      animation: {
        slideIn:   'slideIn .5s cubic-bezier(.77,0,.18,1) both',
        popIn:     'popIn .6s cubic-bezier(.77,0,.18,1) both',
        floatY:    'floatY 2.8s ease-in-out infinite',
        pageIn:    'pageIn .38s cubic-bezier(.77,0,.18,1) both',
        grow:      'grow 1s .2s ease both',
        bounce2:   'bounce2 1.2s ease-in-out infinite',
        confetti:  'confetti 1.2s ease-in forwards',
        pulseGlow: 'pulseGlow 1.6s ease-in-out infinite',
        shimmer:   'shimmer 1.5s linear infinite',
        cardSlide: 'cardSlide .4s cubic-bezier(.77,0,.18,1) both',
      },
    }
  }
}
</script>
<style>
  body { font-family:'Nunito',sans-serif; background:#F0F4F8; overflow-x:hidden; }
  #sidebar::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background:repeating-linear-gradient(90deg,#58CC02 0,#58CC02 24px,#1CB0F6 24px,#1CB0F6 48px,#FFC800 48px,#FFC800 72px,#FF4B4B 72px,#FF4B4B 96px);
    z-index:2;
  }
  #sideScroll::-webkit-scrollbar { display:none; }
  #sideScroll { scrollbar-width:none; }
  .conf { position:fixed; pointer-events:none; animation:confetti 1.2s ease-in forwards; z-index:9999; }
  .xp-bar-fill { animation:grow .9s .3s ease both; }
  .pbar { background:#e4e4e4; height:9px; border-radius:9px; overflow:hidden; }
  .pbar-fill { height:100%; border-radius:9px; position:relative; overflow:hidden; transition:width .8s ease; }
  .pbar-fill::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
    animation:shimmer 1.6s linear infinite; }
  .unit-card { cursor:pointer; transition:transform .18s cubic-bezier(.2,.9,.4,1.1), box-shadow .18s ease; }
  .unit-card:hover { transform:translateY(-4px); }
  .unit-card:active { transform:translateY(2px); }
  .unit-card.locked { cursor:default; }
  .unit-card.locked:hover { transform:none; }
  .lesson-row { transition:transform .18s cubic-bezier(.2,.9,.4,1.1), box-shadow .18s ease; cursor:pointer; }
  .lesson-row:hover { transform:translateY(-3px); }
  .lesson-row:active { transform:translateY(2px); }
  .lesson-row.locked { cursor:default; opacity:.6; }
  .lesson-row.locked:hover { transform:none; }
  .path-line { position:absolute; left:34px; top:8px; bottom:8px; width:4px; border-radius:4px; z-index:0; }
  .back-btn { transition:transform .15s; }
  .back-btn:hover { transform:translateX(-3px); }
  .blob-bg { position:absolute; right:-30px; top:-30px; width:160px; height:160px; border-radius:50%; opacity:.12; background:white; }
  .pill-vocab     { background:#E8F9FF; color:#0A8FCC; }
  .pill-listening { background:#F3EDFF; color:#9B5DE5; }
  .pill-speaking  { background:#EDFCE6; color:#46A302; }
  .pill-quiz      { background:#FFF8E0; color:#E5A100; }
  .pill-story     { background:#FFF0E8; color:#E5600A; }
  .pill-boss      { background:#2d1060; color:#CE82FF; }
</style>
</head>

  let last=-1;
  for(let i=0;i<u.lessons.length;i++){if(u.lessons[i].done)last=i; else break;}
  u.lessons.forEach((l,i)=>l.locked=i>last+1);
  if(last===-1)u.lessons[0].locked=false;
  u.completedCount=u.lessons.filter(l=>l.done).length;
}
units.forEach(u=>{if(!u.locked)syncLocks(u);});

// ── VIEWS ──
function show(v){
  document.getElementById('viewUnits').classList.toggle('hidden',v!=='units');
  document.getElementById('viewDetail').classList.toggle('hidden',v!=='detail');
}
function goBack(){show('units');scrollTo({top:0,behavior:'smooth'});}

// ── UNIT CARDS ──
function renderCards(){
  const c=document.getElementById('unitCardsContainer');c.innerHTML='';
  units.forEach((u,idx)=>{
    const pct=Math.round(u.completedCount/u.lessons.length*100);
    const done=u.completedCount===u.lessons.length;
    const card=document.createElement('div');
    card.className=`unit-card${u.locked?' locked':''} rounded-[28px] overflow-hidden border-b-[6px] shadow-[0_6px_0_#d8d8d8] animate-cardSlide`;
    card.style.cssText=`animation-delay:${idx*.08}s; border-bottom-color:${u.locked?'#ccc':u.ac};`;
    card.innerHTML=`
      <div class="relative overflow-hidden p-5" style="background:${u.locked?'#e8e8e8':u.grad}">
        <div class="blob-bg"></div>
        <div class="relative z-10 flex items-center gap-4">
          <div class="w-16 h-16 rounded-[20px] flex items-center justify-center flex-shrink-0 shadow-lg border-2 border-white/30" style="background:rgba(255,255,255,${u.locked?'.3':'.18'})">
            ${u.locked?I.locked:I[u.icon]}
          </div>
          <div class="flex-1">
            <div class="font-fredoka text-[11px] tracking-[.13em] uppercase ${u.locked?'text-gray-400':'text-white/70'}">Unit ${u.id}</div>
            <div class="font-fredoka text-[22px] leading-tight ${u.locked?'text-gray-400':'text-white'}">${u.title}</div>
            <div class="text-[12px] font-black ${u.locked?'text-gray-300':'text-white/75'} mt-0.5">${u.subtitle}</div>
          </div>
          ${u.locked
            ?`<div class="bg-white/40 text-gray-400 font-fredoka text-sm px-4 py-2 rounded-xl border border-gray-300 flex-shrink-0">Locked</div>`
            :`<div class="bg-white/20 border border-white/35 rounded-full px-3 py-1 text-white font-fredoka text-sm flex-shrink-0">${u.completedCount}/${u.lessons.length}</div>`
          }
        </div>
        ${!u.locked?`
        <div class="relative z-10 mt-3 pbar" style="background:rgba(255,255,255,.25)">
          <div class="pbar-fill" style="width:${pct}%;background:rgba(255,255,255,.7)"></div>
        </div>
        <div class="relative z-10 flex justify-between mt-1">
          <span class="text-[10px] font-black text-white/60">${pct}% complete</span>
          ${done?'<span class="text-[10px] font-black text-white">✅ Done!</span>':''}
        </div>`:''}
      </div>
      <div class="bg-white px-5 py-3 flex items-center gap-4 flex-wrap">
        ${u.locked
          ?`<div class="text-sm font-black text-gray-400 flex-1">Finish Unit ${u.id-1} to unlock</div>`
          :`<div class="flex items-center gap-1.5 flex-1 flex-wrap">
              ${u.lessons.map((_,i)=>`<div class="w-[18px] h-[18px] rounded-full flex items-center justify-center border-2 flex-shrink-0 ${i<u.completedCount?'bg-green border-green-dark':(i===u.completedCount?'bg-yellow/30 border-yellow-dark':'bg-gray-100 border-gray-200')}">${i<u.completedCount?'<svg width="9" height="9" viewBox="0 0 10 10"><path d="M2 5 L4 7 L8 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>':''}</div>`).join('')}
            </div>
            <button class="font-fredoka text-[14px] text-white px-5 py-2 rounded-[14px] border-b-[3px] transition-all active:translate-y-[2px] hover:brightness-110 flex-shrink-0"
              style="background:${u.grad};border-bottom-color:${u.ac}">
              ${u.completedCount===0?'Start →':(done?'Review →':'Continue →')}
            </button>`
        }
      </div>`;
    if(!u.locked) card.addEventListener('click',()=>openUnit(u.id));
    else card.addEventListener('click',()=>showMsg('Complete the previous unit first! 🔒','#FFC800'));
    c.appendChild(card);
  });
}

// ── UNIT DETAIL ──
function openUnit(uid){
  const u=units.find(x=>x.id===uid);
  if(!u||u.locked)return;
  const pct=Math.round(u.completedCount/u.lessons.length*100);

  document.getElementById('detailBadge').innerHTML=`
    <div class="w-12 h-12 rounded-[16px] flex items-center justify-center border-b-4 shadow-md flex-shrink-0" style="background:${u.grad};border-bottom-color:${u.ac}">${I[u.icon]}</div>
    <div>
      <div class="text-[10px] font-black uppercase tracking-widest" style="color:${u.ac}">Unit ${u.id}</div>
      <div class="font-fredoka text-[24px] text-[#2c2c2c] leading-none">${u.title}</div>
      <div class="text-xs font-black text-gray-400 mt-0.5">${u.subtitle}</div>
    </div>`;

  document.getElementById('detailProgressWrap').innerHTML=`
    <div class="flex items-center gap-2 shrink-0">
      <svg width="38" height="38" viewBox="0 0 38 38">
        <circle cx="19" cy="19" r="16" fill="none" stroke="#eee" stroke-width="4"/>
        <circle cx="19" cy="19" r="16" fill="none" stroke="${u.ac}" stroke-width="4"
          stroke-dasharray="${+(2*Math.PI*16*pct/100).toFixed(1)} 999" stroke-linecap="round" transform="rotate(-90 19 19)"/>
        <text x="19" y="24" text-anchor="middle" font-size="9" font-weight="900" fill="${u.ac}" font-family="Nunito">${pct}%</text>
      </svg>
      <div><div class="font-fredoka text-[15px] text-[#3c3c3c]">${u.completedCount}/${u.lessons.length} done</div>
      <div class="text-xs font-black" style="color:${u.ac}">${u.completedCount===u.lessons.length?'✅ Complete!':'In progress...'}</div></div>
    </div>
    <div class="flex-1"><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${u.grad}"></div></div></div>
    <div class="flex items-center gap-1 bg-gray-50 rounded-full px-3 py-1.5 border border-gray-200 shrink-0">
      ${I.starF}<span class="font-fredoka text-sm text-yellow-dark ml-0.5">${u.lessons.filter(l=>l.done).reduce((a,b)=>a+b.xp,0)}</span>
      <span class="text-xs font-black text-gray-400">/ ${u.lessons.reduce((a,b)=>a+b.xp,0)} XP</span>
    </div>`;

  renderLessons(u);
  show('detail');
  scrollTo({top:0,behavior:'smooth'});
}

function renderLessons(u){
  const c=document.getElementById('lessonsListContainer');c.innerHTML='';
  const pl=document.createElement('div');
  pl.className='path-line';
  pl.style.background=`linear-gradient(to bottom,${u.ac}55,${u.ac}20)`;
  c.appendChild(pl);

  u.lessons.forEach((l,idx)=>{
    const tp=TP[l.type]||TP.vocab;
    const isBoss=l.type==='boss';
    const isNext=!l.done&&!l.locked;

    const row=document.createElement('div');
    row.className=`lesson-row${l.locked?' locked':''} flex items-center gap-4 rounded-[22px] px-4 py-3 border-l-[8px] relative z-10 animate-cardSlide`;
    row.style.cssText=`
      animation-delay:${idx*.04}s;
      border-left-color:${l.done?'#58CC02':(isNext?'#FFC800':'#e0e0e0')};
      box-shadow:${isNext?'0 0 0 3px rgba(255,200,0,.4),0 7px 0 #c8b800':'0 5px 0 #e0e0e0'};
      background:${isBoss&&!l.locked?'linear-gradient(120deg,#1e0e45,#2d1060)':(l.done?'#EDFCE6':(l.locked?'#f7f7f7':'white'))};`;

    const iconBg=l.done?'#d4fac2':(l.locked?'#ebebeb':(isBoss?'rgba(206,130,255,.12)':'#fff8e0'));
    const iconBd=l.done?'#58CC02':(l.locked?'#ccc':(isBoss?'#CE82FF':'#FFC800'));

    let action=l.done
      ?`<div class="flex flex-col items-center gap-1">${I.check}<div class="flex gap-0.5">${[0,1,2].map(i=>i<l.stars?I.starF:I.starE).join('')}</div></div>`
      :(isNext?`<div class="animate-bounce2">${I.play}</div>`:I.locked);

    row.innerHTML=`
      <div class="w-14 h-14 rounded-full flex items-center justify-center flex-shrink-0 border-2" style="background:${iconBg};border-color:${iconBd}">
        ${l.locked?I.locked:I[l.icon]}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-fredoka text-[17px] ${isBoss&&!l.locked?'text-white':'text-gray-800'}">${l.title}</span>
          <span class="inline-flex items-center gap-1 text-[10px] font-black px-2 py-0.5 rounded-full uppercase ${tp.cls}">
            ${I[tp.ic]?.replace(/width="18" height="18"/g,'width="11" height="11"')} ${tp.lb}
          </span>
        </div>
        <div class="flex items-center gap-3 mt-0.5 flex-wrap">
          <span class="text-xs font-black ${isBoss&&!l.locked?'text-purple/80':'text-green-dark'} flex items-center gap-0.5">
            ${I.starF.replace(/width="14" height="14"/g,'width="11" height="11"')} ${l.xp} XP
          </span>
          ${isNext?'<span class="text-xs font-black text-yellow-dark animate-pulseGlow">← Start here!</span>':''}
          ${isBoss&&!l.locked?'<span class="text-xs font-black" style="color:#CE82FF">Final challenge!</span>':''}
          ${l.locked?'<span class="text-xs font-black text-gray-400">Complete previous first</span>':''}
        </div>
      </div>
      <div class="flex-shrink-0">${action}</div>`;

    // ✅ KLIK LESSON → NAVIGASI KE HALAMAN BARU (bukan modal)
    row.addEventListener('click',()=>{
      if(l.locked){showMsg('🔐 Complete previous lessons first!','#FFC800');return;}
      // Navigasi ke halaman lesson (ganti URL sesuai project kamu)
      window.location.href = getLessonPageUrl(u.id, l.id);
    });
    c.appendChild(row);
  });
}

// ── UTILS ──
function showMsg(msg,bg){
  const t=document.createElement('div');
  t.className='fixed bottom-8 left-1/2 -translate-x-1/2 text-white font-fredoka px-6 py-3 rounded-full shadow-xl z-[300] animate-popIn whitespace-nowrap text-sm';
  t.style.background=bg; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}
function fireConf(){
  const sh=['●','★','✦','▲','◆','✿'],cl=['#58CC02','#1CB0F6','#FFC800','#FF4B4B','#CE82FF','#FF9600'];
  const c=document.createElement('div');c.className='conf';
  c.textContent=sh[Math.floor(Math.random()*sh.length)];
  c.style.cssText=`left:${5+Math.random()*80}vw;top:${5+Math.random()*50}vh;font-size:${14+Math.random()*18}px;color:${cl[Math.floor(Math.random()*cl.length)]};animation-duration:${.7+Math.random()*.9}s;`;
  document.body.appendChild(c);setTimeout(()=>c.remove(),1600);
}
function navGo(p){
  setTimeout(()=>{const m={streak:'streak-page.html',home:'index.html',minigames:'minigames.html',achievements:'achievements-tailwind.html',settings:'settings.html'};window.location.href=m[p]||'index.html';},200);
}

show('units');
renderCards();
</script>
